name: Build ClipStash

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.3.12）'
        required: true
        default: '1.3.12'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push') {
            $tag = '${{ github.ref_name }}'
            $ver = $tag -replace '^v',''
          } else {
            $ver = '${{ github.event.inputs.version }}'
          }
          Write-Output "value=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Build version: $ver"

      - name: Build installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ver = '${{ steps.version.outputs.value }}'

          # Sync version to main.py
          (Get-Content main.py) -replace 'APP_VERSION = "v[\d.]+"', "APP_VERSION = `"v$ver`"" | Set-Content main.py

          # Sync version to build.ps1 (for local consistency)
          (Get-Content setup/build.ps1) -replace '\$Version = "[\d.]+"', "`$Version = `"$ver`"" | Set-Content setup/build.ps1

          # 1. Clean old output
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "dist\ClipStash", "build"

          # 2. PyInstaller
          Write-Host "[1/3] PyInstaller --onedir ..." -ForegroundColor Cyan
          python -m PyInstaller `
            --noconfirm `
            --onedir `
            --windowed `
            --name ClipStash `
            --icon assets\app_icon.ico `
            --add-data "assets;assets" `
            --collect-data tkinterdnd2 `
            --exclude-module PyQt5 `
            --exclude-module PyQt6 `
            --exclude-module PySide2 `
            --exclude-module PySide6 `
            main.py
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller failed" }

          # 3. Update ISS version
          Write-Host "[2/3] Sync version to ISS script ..." -ForegroundColor Cyan
          $issPath = Join-Path $PWD "setup\ClipStash.iss"
          $iss = Get-Content $issPath -Raw
          $iss = $iss -replace '#define MyAppVersion "[\d.]+"', "#define MyAppVersion `"$ver`""
          Set-Content $issPath $iss -NoNewline

          # 4. Locate ISCC.exe (robust fallback)
          Write-Host "[3/3] Locate ISCC.exe ..." -ForegroundColor Cyan
          $iscc = $null

          # 4a. Try PATH
          $cmd = Get-Command ISCC.exe -ErrorAction SilentlyContinue
          if ($cmd) { $iscc = $cmd.Source }

          # 4b. Try standard install locations
          if (-not $iscc) {
            $candidates = @(
              "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
              "${env:ProgramFiles}\Inno Setup 6\ISCC.exe",
              "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
              "C:\Program Files\Inno Setup 6\ISCC.exe"
            )
            foreach ($c in $candidates) {
              if (Test-Path $c) { $iscc = (Resolve-Path $c).Path; break }
            }
          }

          # 4c. Search C:\ProgramData (choco sometimes installs here)
          if (-not $iscc) {
            $found = Get-ChildItem -Path "C:\ProgramData" -Filter "ISCC.exe" -Recurse -Depth 3 -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $iscc = $found.FullName }
          }

          # 4d. Last resort: search entire C: drive with limited depth
          if (-not $iscc) {
            Write-Host "Searching C:\ for ISCC.exe (this may take a few seconds)..."
            $found = Get-ChildItem -Path "C:\" -Filter "ISCC.exe" -Recurse -Depth 4 -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $iscc = $found.FullName }
          }

          if (-not $iscc) {
            Write-Error "ISCC.exe not found after choco install. Checked: PATH, Program Files, ProgramData, C:\ drive (depth 4)."
            exit 1
          }
          Write-Host "Found ISCC.exe at: $iscc" -ForegroundColor Green

          # 5. Build installer
          & $iscc $issPath
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compiler failed" }

          Write-Host "`nBuild complete!" -ForegroundColor Green
          $artifact = Get-ChildItem "dist\ClipStash-Setup-v*.exe" | Select-Object -First 1
          if ($artifact) {
            Write-Host "Artifact: $($artifact.FullName)" -ForegroundColor Yellow
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipStash-Setup-v${{ steps.version.outputs.value }}
          path: dist/ClipStash-Setup-v*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ClipStash-Setup-v*.exe
          generate_release_notes: true
