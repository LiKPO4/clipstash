name: Build ClipStash

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.3.5）'
        required: true
        default: '1.3.5'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y
          $exe = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Inno Setup 6","${env:ProgramFiles}\Inno Setup 6" -Filter "ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            $exe = Get-ChildItem -Path "C:\Program Files*" -Filter "ISCC.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($exe) {
            echo $exe.DirectoryName >> $env:GITHUB_PATH
            Write-Host "Found ISCC at: $($exe.FullName)"
          } else {
            Write-Error "ISCC.exe not found after choco install"
            exit 1
          }

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push') {
            $tag = '${{ github.ref_name }}'
            $ver = $tag -replace '^v',''
          } else {
            $ver = '${{ github.event.inputs.version }}'
          }
          Write-Output "value=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Build version: $ver"

      - name: Sync version to source
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.value }}'
          # main.py
          (Get-Content main.py) -replace 'APP_VERSION = "v[\d.]+"', "APP_VERSION = `"v$ver`"" | Set-Content main.py
          # build.ps1 default param
          (Get-Content setup/build.ps1) -replace '\$Version = "[\d.]+"', "`$Version = `"$ver`"" | Set-Content setup/build.ps1

      - name: Build with PyInstaller + Inno Setup
        shell: pwsh
        run: |
          cd setup
          .\build.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipStash-Setup-v${{ steps.version.outputs.value }}
          path: dist/ClipStash-Setup-v*.exe
