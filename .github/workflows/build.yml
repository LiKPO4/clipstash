name: Build ClipStash Next

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 2.0.0）'
        required: true
        default: '2.0.0'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: clipstash-next/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push') {
            $tag = '${{ github.ref_name }}'
            $ver = $tag -replace '^v',''
          } else {
            $ver = '${{ github.event.inputs.version }}'
          }
          Write-Output "value=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Build version: $ver"

      - name: Sync ClipStash Next version
        shell: pwsh
        env:
          CLIPSTASH_VERSION: ${{ steps.version.outputs.value }}
        run: |
          $ErrorActionPreference = "Stop"
          $ver = $env:CLIPSTASH_VERSION

          $packagePath = "clipstash-next\package.json"
          $packageLockPath = "clipstash-next\package-lock.json"
          $cargoTomlPath = "clipstash-next\src-tauri\Cargo.toml"
          $tauriConfigPath = "clipstash-next\src-tauri\tauri.conf.json"
          $appPath = "clipstash-next\src\App.tsx"

          $syncPackageJson = @'
          const fs = require("fs");
          const version = process.env.CLIPSTASH_VERSION;
          for (const path of ["clipstash-next/package.json", "clipstash-next/package-lock.json"]) {
            const data = JSON.parse(fs.readFileSync(path, "utf8"));
            data.version = version;
            if (data.packages && data.packages[""]) {
              data.packages[""].version = version;
            }
            fs.writeFileSync(path, `${JSON.stringify(data, null, 2)}\n`);
          }
          '@
          node -e $syncPackageJson

          (Get-Content $cargoTomlPath -Raw) -replace '(?m)^version = "[0-9]+\.[0-9]+\.[0-9]+"', "version = `"$ver`"" | Set-Content $cargoTomlPath -NoNewline
          (Get-Content $tauriConfigPath -Raw) -replace '"version": "[0-9]+\.[0-9]+\.[0-9]+"', "`"version`": `"$ver`"" -replace '"title": ".*@linjianglu"', "`"title`": `"需求暂存站 v$ver  @linjianglu`"" | Set-Content $tauriConfigPath -NoNewline
          (Get-Content $appPath -Raw) -replace 'const CURRENT_VERSION = "[0-9]+\.[0-9]+\.[0-9]+";', "const CURRENT_VERSION = `"$ver`";" | Set-Content $appPath -NoNewline

      - name: Install frontend dependencies
        working-directory: clipstash-next
        run: npm ci

      - name: Run frontend tests
        working-directory: clipstash-next
        run: npm test -- --run

      - name: Run Rust tests
        working-directory: clipstash-next/src-tauri
        run: cargo test

      - name: Build Tauri bundles
        working-directory: clipstash-next
        run: npm run tauri build

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClipStash-Next-v${{ steps.version.outputs.value }}
          path: |
            clipstash-next/src-tauri/target/release/bundle/msi/*.msi
            clipstash-next/src-tauri/target/release/bundle/nsis/*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clipstash-next/src-tauri/target/release/bundle/msi/*.msi
            clipstash-next/src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
